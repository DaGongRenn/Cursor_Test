<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>给田静的告白</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      display: grid;
      place-items: center;
      font-family: "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top, #ffdde8, #ffc2d1 45%, #ff8fab 100%);
    }
    .heart {
      position: fixed;
      top: -20px;
      color: rgba(255, 255, 255, 0.8);
      animation: fall linear forwards;
      pointer-events: none;
      user-select: none;
    }
    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(360deg);
        opacity: 0.1;
      }
    }
    .card {
      width: min(92vw, 600px);
      background: rgba(255, 255, 255, 0.9);
      backdrop-filter: blur(3px);
      border-radius: 18px;
      padding: 30px 24px;
      text-align: center;
      box-shadow: 0 12px 32px rgba(160, 20, 72, 0.25);
      z-index: 2;
    }
    h1 {
      margin: 0 0 10px;
      color: #b30059;
      font-size: 30px;
    }
    .subtitle {
      margin: 0 0 18px;
      color: #7a2f4b;
      line-height: 1.7;
    }
    .hidden {
      display: none;
    }
    .confess {
      margin: 16px 0 0;
      padding: 14px;
      border-radius: 12px;
      background: #fff3f7;
      color: #9c295c;
      font-size: 18px;
      line-height: 1.7;
    }
    .actions {
      margin-top: 18px;
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 18px;
      font-size: 15px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.2s ease;
    }
    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 12px rgba(0, 0, 0, 0.16);
    }
    .primary { background: #ff4d88; color: #fff; }
    .yes { background: #ff2e63; color: #fff; }
    .later { background: #ffe5ef; color: #9f2f60; }
    #reply {
      margin-top: 16px;
      min-height: 28px;
      color: #8a1f4d;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>田静，我喜欢你</h1>
    <p class="subtitle">
      认识你以后，平凡的日子都变得闪闪发光。<br />
      这页只想认真告诉你：我想一直陪着你。
    </p>

    <div class="actions">
      <button id="showBtn" class="primary">点我看真心话</button>
      <button id="yesBtn" class="yes">我愿意</button>
      <button id="laterBtn" class="later">再想想</button>
    </div>

    <p id="confessText" class="confess hidden">
      田静，你愿意做我的女朋友吗？<br />
      从今天起，我想把所有温柔都给你。
    </p>
    <div id="reply"></div>
  </main>

  <script>
    const showBtn = document.getElementById("showBtn");
    const yesBtn = document.getElementById("yesBtn");
    const laterBtn = document.getElementById("laterBtn");
    const confessText = document.getElementById("confessText");
    const reply = document.getElementById("reply");

    showBtn.addEventListener("click", () => {
      confessText.classList.remove("hidden");
      reply.textContent = "我已经把心里话说出来啦。";
    });

    yesBtn.addEventListener("click", () => {
      confessText.classList.remove("hidden");
      reply.textContent = "太开心了！以后每天都更爱你一点。";
    });

    laterBtn.addEventListener("click", () => {
      reply.textContent = "没关系，我会继续用行动证明我的真心。";
    });

    function createHeart() {
      const heart = document.createElement("span");
      heart.className = "heart";
      heart.textContent = Math.random() > 0.5 ? "❤" : "💖";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = 14 + Math.random() * 18 + "px";
      heart.style.animationDuration = 4 + Math.random() * 5 + "s";
      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 9000);
    }

    setInterval(createHeart, 280);
  </script>
</body>
</html>
