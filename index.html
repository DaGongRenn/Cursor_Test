<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Page</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #f5f7fa, #c3cfe2);
    }
    .card {
      background: #fff;
      padding: 24px 28px;
      border-radius: 12px;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.12);
      text-align: center;
      max-width: 520px;
    }
    h1 {
      margin-top: 0;
      color: #333;
    }
    p {
      color: #555;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <main class="card">
    <h1>Hello, GitHub!</h1>
    <p>This is a simple HTML page created by Cursor.</p>
    <p>Have a great day.</p>
  </main>
</body>
</html>
